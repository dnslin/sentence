services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: juhua:latest
    container_name: juhua-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    volumes:
      - juhua-data:/app/data
    command: ["pnpm", "start"]

  worker:
    image: juhua:latest
    container_name: juhua-worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
    volumes:
      - juhua-data:/app/data
    command: ["pnpm", "worker:ready-pool"]
    depends_on:
      - web

volumes:
  juhua-data:
